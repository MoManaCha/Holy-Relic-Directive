---
地表环境:
  划分依据: 纳米尘污染等级
  D级 - 绿色安全区:
    纳米尘浓度: 低，接近可呼吸，但仍有残留腐蚀性，长期无防护有风险
    环境特征: 文明最后的“伤疤”，有变异植被萌发，偶尔能见模糊日光，空气有微弱金属腥味
    SRB移动站点:
      - D/C级社区型站点: 规模庞大，功能齐全，是主要补给休整中心，氛围相对轻松
    可能出现的地点:
      - 旧世界农业研究站废墟: 可搜寻“生物样本”和“旧世界数据盘”
      - 隔离生态温室群: 可能保存有小型生态系统，产出稀有样本、种子、技术资料和纯净水
      - SRB前哨净化站: 已废弃，可回收“高精度组件”和“过滤材料”
      - 幸存者小型聚落: 可能成为任务发布点或提供独特交易品
      - 净水处理厂遗址: 深层蓄水池可能存有相对干净的水源，是“净化溶剂”来源
  C级 - 黄色缓和区:
    纳米尘浓度: 中等，必须佩戴过滤面罩，短时裸露会导致刺痛和皮疹
    环境特征: 最常见的废土景观，灰黄色天空，腐蚀性沙尘，能见度一般
    SRB移动站点:
      - D/C级社区型站点: 与D级区类似，但戒备更森严，有更多自动炮塔和巡逻单位
    可能出现的地点:
      - 自动化物流仓库: 失控机械臂仍在运作，可从中搜寻“结构框架”和“零件”
      - 废弃的城市商业区: 可搜寻“零件”、“结构框架”和“旧世界遗物”
      - 学校或图书馆遗址: 服务器机房可能藏有完好的“旧世界数据盘”
      - 交通枢纽: 废弃车厢和飞机残骸中可找到“零件”和“特殊合金”
      - 居民区公寓楼群: 探索可找到个人遗物或武器配件，每个房间都可能讲述一个故事
  B级 - 橙色污染区:
    纳米尘浓度: 高，必须穿全封闭防护服和循环氧气，短时暴露即会造成严重伤害
    环境特征: 纳米尘形成可见的橙色雾霭，能见度极低，充满静电，通讯受严重干扰
    SRB移动站点:
      - B级前沿站点: 小规模的武装碉堡，装甲厚重，火力强大，内部设施简陋
    可能出现的地点:
      - 旧世界军事基地/兵工厂: 防御森严，是“高精度组件”、“稀有合金”和“武器蓝图”的最佳来源
      - 大型科研院所/实验室: 可能残留危险化学品，可找到“生物样本”或“心智冷却液配方”
      - 摇篮计划研究所分部: 秘密研究设施，可发现改造技术资料、原型冷却液样本或早期秘密
      - UWS生产工厂废墟: 风险极高，但可能发现休眠原型机或核心生产矩阵
      - ACU残骸堆积场: 金属坟场，可回收“ACU核心”、“特殊合金”，但有清道夫型ACU出没
  A级 - 红色警戒区:
    纳米尘浓度: 超高，呈半液态红色风暴，即刻致命，标准陆行舰装甲也只能短时承受
    环境特征: 战争的“原爆点”，红色风暴遮天蔽日，电闪雷鸣，空间扭曲，物理定律不可靠
    SRB移动站点:
      - A级禁区哨站: 极其罕见，外形如金字塔，采用匿踪和能量护盾，仅对王牌指挥官开放
    可能出现的地点:
      - ACU中央处理器“利维坦”残骸: 巨型要塞残骸，可找到顶级核心代码、终极武器模块和核心情报，但防御致命
      - “终极AI”指挥塔遗址: 可能记录着战争真相、ACU起源等秘密，是主线核心区域
      - 摇篮的废弃原型设施: 可能封存着计划最黑暗的秘密和第一批失败实验体
      - 纳米尘风暴之眼: 风暴核心的平静区，可能存在控制纳米尘的“源头”或“ACU之王”
      - “地面方舟”的残骸: 被摧毁的地面城市，可能有人类文明未面世的技术遗产