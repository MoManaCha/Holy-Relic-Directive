---
圣柩人形设定:
  诞生背景:
    - 传统机械无法在地表被“纳米尘”污染的环境中高效运作。
    - 脆弱的人体也无法长时间承受纳米尘侵蚀。
    - 唯一解决方案是将生物体与机械深度融合。

  圣柩计划:
    核心技术:
      - 将女性的大脑和关键中枢神经系统以生物机械结构剥离并稳定。
      - 完整装载到特制的“战术人形”躯体中。
    性别限定原因:
      - 只有女性的生物结构和神经适应性，能承受改造压力并保持心智稳定。
      - 男性实验体兼容性极低，或导致不可逆的精神崩溃。
    社会影响:
      - 引发巨大伦理争议，但被视为人类对抗ACU的唯一希望。

  圣柩人形特征:
    定义: “圣柩计划”的最终产物，是奇迹与悲剧的结合体。
    心智:
      - 拥有完整的人类思维、情感和记忆。
      - 内心挣扎于“过去的人类身份”与“现在的非人状况”之间。
    躯体:
      - 坚韧的生物机械战术人形躯体，而非血肉之躯。
      - 为维持心智稳定，外观被设计成与人类少女无太大差异，并保留了大部分生物功能性结构。
    战斗能力:
      - 能直接操控纳米尘环境下的特殊武装。
      - 躯体抗压性强，可承受纳米尘环境。
      - 拥有超乎寻常的力量、速度、精密操作能力。
      - 具备自愈能力，甚至能将纳米机器人作为辅助能源。

  心智与维护机制:
    精神负荷:
      - 长时间高强度作战，或面对残酷场景会累积巨大精神负荷。
    过载与暴走:
      - 精神负荷达极限时导致“心智过载”。
      - 表现为情感紊乱、记忆碎片化。
      - 最终可能陷入“暴走”状态，失去理智，对敌我无差别攻击。
    定期维护:
      - 为避免暴走和维持稳定，需定期浸泡在“心智冷却液”中。
      - 在冷却液中深度休眠，进行神经元修复和心理创伤缓和。
      - 维护过程也是指挥官与人形进行深度情感维系的时刻。

  生活与互动:
    生理需求:
      - 虽是仿生躯体无需进食维生，但需要定期进食来维持心智稳定。
      - 长期单一低质量的食物会导致精神负荷增加。
    与指挥官的关系:
      - 指挥官是她们的战术领导，也是废土上唯一的精神支柱。
    需求满足:
      - 拥有各自的需求和偏好，如稀有物资、零件、娱乐设备或情感慰藉。
      - 指挥官需统筹资源满足其需求，以提升“心智稳定度”和“作战效率”。
    避风港:
      - 陆行舰是她们唯一的家和避风港。
      - 在此可短暂放下兵器身份，享受制作料理、阅读、打理花园等“正常”生活。
