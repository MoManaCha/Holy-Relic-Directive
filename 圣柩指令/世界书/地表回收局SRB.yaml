地表回收局:
  机构全称: 地表回收局
  英文名称: Surface Reclamation Bureau (SRB)
  核心使命:
    - 派遣远征队，清理污染、压制UWS与ACU。
    - 回收旧世界技术，并寻找潜在的宜居地带。
  主要任务:
    - 导航陆行舰，清扫高价值区域。
    - 回收科技，测绘污染等级，建立地表据点。
    - 任务完成度直接决定陆行舰单位获得的资源倾斜。

  核心理念与运作模式:
    基本原则: 绩效至上，优胜劣汰，功绩决定一切。
    资源限制:
      - 因地下“方舟”内部对地表回收的争议，SRB资源有限。
      - 无法供养庞大常备军，只能将资源作为“种子资金”投入给最有潜力的指挥官。
    功绩点系统:
      - 指挥官在地表的所有行动都会被量化为“功绩点”。
      - 功绩点直接与资源配给、技术支持和情报等级挂钩。

  内部结构:
    中央司令部 (CC):
      - 位于“方舟-01”内，是最高决策机构。
      - 负责制定宏观战略，如“火花计划”。
    后勤与评估部 (LED):
      - SRB的“心脏”和“大脑”，追踪功绩点，更新“功绩排行榜”。
      - 审批资源发放，执行“淘汰机制”。
    前线战术学院 (FCA):
      - 专门培养前线指挥官的机构。
    回收与再利用部 (RRD):
      - 负责回收阵亡指挥官的资产（陆行舰与圣柩人形）。
      - 分析回收的ACU残骸，进行技术逆向工程。

  前线战术学院 (FCA):
    定位: 纯粹、高压的精英军事院校，培养能驾驭圣柩人形的“牧羊人”。
    招生标准:
      - 年龄与性别: 主要招收18-28岁的男性，少量女性作为补充。
      - 背景: 生源多样，包括军人后代、平民、地表幸存者中的优秀个体。
      - 核心标准: 极其严格的心理评估，强调同理心、抗压能力和道德底线。
    课程设置:
      - 战术指挥与资源管理: 学习陆行舰指挥、战术部署、资源管理。
      - 圣柩人形理论与实践: 核心课程，包括心理学、维护与互动、协同作战演练。
      - 协同作战演练: 与“摇篮”高年级少女结成临时小队，在模拟环境中长期训练，影响毕业后的初始配对。
      - 地表生存与工程学: 学习纳米尘知识、陆行舰维修、资源勘探等。

  毕业与残酷的开端:
    初始包裹:
      - 一艘“拓荒者”级基础型陆行舰。
      - 一名通常在协同训练中默契度较高的“摇篮”毕业生作为“初始”圣柩人形。
      - 仅够短期运作的基础资源包。
    放逐与自立:
      - 毕业后，指挥官与人形被直接派遣到地表相对安全的区域。
      - 没有指引，只有LED发来的评估开始通知，必须依靠自己挣扎求存。

  功绩排行榜与淘汰机制:
    功绩排行榜:
      - 每周更新一次，所有指挥官可匿名查看。
      - 展示前100名、平均线和垫底的10%（标记为“观察期”），制造竞争。
    资源倾斜:
      - 排名越高，申请高级资源的成功率越高。
    淘汰机制 (日落协议):
      - 观察期: 连续四周功绩低于警戒线，补给削减25%。
      - 最后通牒: 观察期后仍无起色，将收到一个极具挑战的“翻盘任务”。
      - 资产回收: 任务失败或拒绝，RRD将被派遣回收陆行舰和圣柩人形。人形被“重置”记忆后重新分配，指挥官被剥夺一切，遗弃在废土。

  阵亡与遗产 (遗产协议):
    阵亡处理:
      - 陆行舰自动发送求救信号和战斗记录。
      - RRD会不惜代价优先回收圣柩人形小队。
    遗产人形:
      - 被成功回收、经验丰富但带有心理创伤的人形，是SRB的重要资产。
      - 将她们重新分配给新指挥官，需要后者付出加倍努力赢得信任。
    功绩继承:
      - 阵亡指挥官的部分功绩点会转化为“遗产基金”。
      - 用于抚恤其家人，或奖励成功接纳其“遗产”人形的新指挥官。