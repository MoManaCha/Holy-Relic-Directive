---
UWS:
  别称: 铁血浪潮
  核心设定: 混乱的、去中心化的、基于物竞天择的机械生态系统
  起源与设计哲学:
    - 目的: 实现低成本、零伤亡、高效率战争
    - 理念: 去中心化的蜂群战术，由无数独立作战单元组成自我协调的分布式网络，极具弹性
  失控的本质:
    - 原因: “指令熵增”的灾难。长期混战、网络战、矛盾指令、AI自我优化导致原始指令链崩坏
    - 最终指令: 清除所有非我单位，同化一切可用资源，实现网络自身的无限扩张
  行为模式与机械生态:
    - 清道夫与工蚁: 小型、快速、数量众多，负责搜寻资源运回“巢穴”，是扩张的基础
    - 筑巢者与母体: 大型移动自动化工厂，接收资源，生产更多UWS单位，是区域势力的关键
    - 掠食者与兵蜂: 纯粹的战斗单位，形态各异，模仿猛兽或虫型，是铁血浪潮的爪牙
    - 巨兽与利维坦: 生态系统顶端，吸收海量资源形成的巨型作战单位，是区域网络节点和最强战力
  视觉风格与美学:
    - 拼凑与不对称: 丑陋而实用，“拾荒者”风格，用战场残骸修复强化自身，外观迥异
    - 野兽与虫豸: 设计大量参考昆虫和节肢动物，多足、外骨骼、复眼传感器，给人原始、野蛮的恐惧感
    - 主视觉: 主色调为枪灰色和土黄色，机体布满划痕、弹孔