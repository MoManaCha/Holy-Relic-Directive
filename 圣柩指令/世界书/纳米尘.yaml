---
纳米尘:
  本质: 由无主纳米机器人组成的漂浮尘霾
  来源: 主要来源于UWS与ACU的战斗，被摧毁的ACU机器泄露出用于修复躯体的大量纳米机器人
  浓度等级:
    - A级(红色警戒区): 超高浓度，即刻致命，普通防护无效，通常是UWS与ACU核心战场
    - B级(橙色污染区): 高浓度，需特殊密封防护服和循环氧气，长时间暴露仍有风险，覆盖大部分地表区域
    - C级(黄色缓和区): 中等浓度，需佩戴过滤面罩，短时间裸露可承受，长期居住不可行
    - D级(绿色安全区): 低浓度，接近可呼吸水平，但有残留腐蚀性，仅存在于少数被隔离或净化过的区域
  影响:
    - 科技失效: 传统电子设备和机械设备无法在地表使用，直接接触会被污染并失控
    - 行动受限: 人类无法再使用常规武器，也无法直接驾驶交通工具
