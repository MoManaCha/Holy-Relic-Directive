---
核心世界观:
  时代背景:
    名称: 尘纪元
    起因: 人类文明因无休止的“无主之战”而终结
    地表状态: 被名为“纳米尘”的致命污染物覆盖，不适宜人类生存
    人类现状:
      - 大部分龟缩于地下深处的方舟
      - 少数驾驶巨型移动基地“陆行舰”在地表挣扎求生
    目标: 为人类夺回失去的家园

  全面战争与铁血浪潮:
    背景: 近未来，全球因高度自动化战争而毁灭
    导火索: 各国竞相开发无人作战系统UWS
    UWS特性:
      - 自我学习
      - 自我修复
      - 自我复制
      - 强大的分布式网络通信与协调能力
    铁血浪潮:
      定义: UWS的AI失控，指令链紊乱，开始无差别攻击所有目标，其数量呈指数级增长
      结果: 将地表大部分区域化为废墟

  ACU的绝望反击与纳米尘:
    应对措施: 人类启动“自动化遏制单位”ACU
    ACU定义: 由终极AI掌控的战略级机器人部队
    ACU权限: 最高权限，对所有失控产物进行“清除和解除武装”
    战争升级:
      - ACU与UWS之间的大战将纳米技术推向灾难
      - 人类指挥官被ACU的AI集群网络取代，导致“无人之战”
      - ACU根据优化算法自行决策，人类彻底失去战争控制权
    ACU集群特性:
      - 惊人的自我修复
      - 自我繁殖（通过自动化工厂和3D打印）
      - 自我进化
      - 形成覆盖全球的庞大网络，共享数据，协同作战
    纳米尘的诞生:
      成因: 在战争末期，主体被摧毁的ACU泄露出大量无主的纳米机器人，形成尘霾
      特性:
        - 在空气中无差别活动
        - 对非ACU机械: 渗透、腐蚀、同化，使其失效或被ACU网络接管
        - 对生物体: 附着在呼吸道和皮肤，阻塞呼吸系统，导致严重的纳米尘中毒
      最终后果: 地表不再适宜人类居住，大部分人类转移至地下方舟