---  
核心内部设施:
    舰桥:
      描述: 陆行舰的神经中枢。低等级舰桥为紧凑的环绕式控制台布局，中央悬挂全息战术沙盘；高等级舰桥则拥有多层环形指挥区域，配备独立的情报分析室和远程通信阵列
      功能: 战术指挥、路线规划、资源监控、与SRB总部通讯。高等级舰桥可同时协调多支舰队和广泛的区域作战
      互动: 圣柩人形汇报工作，或在非战斗时段于此观看废土风景
    整备室:
      描述: 舰内人形装备维护与部署中心。低等级为简易武器架和基础维护终端；高等级则为宽敞多层次的大型整备库，排列专用武器挂架、备用装甲模块和自动化维护系统
      功能: 人形武器更换、装备升级、战术模块安装调试，通过升降平台或弹射通道快速部署。高等级可同时整备多支完整小队
      互动: 指挥官可在此查看配置、与保养装备的人形交谈、给予鼓励以略微提升心智稳定度
    冷却槽室:
      描述: 圣柩人形精神修复的专用空间。低等级仅有一个基础冷却槽；高等级可配置多个高级冷却槽并附带心智数据监测阵列
      功能: 圣柩人形进行深度精神修复的核心设施，等级越高则同时处理的人形数量越多、修复效果越好
      互动: 建立深层羁绊的核心场景，指挥官可通过陪伴、播放音乐、讲述外界经历来加快恢复并加深羁绊
    食堂:
      描述: 舰内用餐与社交中枢。低等级为简易烹饪设备和金属桌椅；高等级为完整的餐饮中心，配备多台专用烹饪机和非合成食材储存区
      功能: 可消耗食材制作不同料理，为人形提供暂时属性或心情加成。高等级食堂可举办小型宴会，提升全队士气
      互动: 触发日常剧情的主要场所，可与人形互动、加入游戏、分享找到的旧世界珍宝
    圣柩休息室:
      描述: 最具生活气息的公共空间。低等级仅有基础沙发和官方频道电视；高等级可配置图书角、投影仪、游戏终端乃至小型室内花园
      功能: 触发随机日常事件的主要场所，设施越丰富可触发的事件类型越多
      互动: 指挥官可在此与休息的人形闲聊、了解兴趣、赠送旧世界遗物作为礼物
    指挥官的房间:
      描述: 指挥官的私人空间。低等级为狭小但整洁的单间，配有行军床和办公桌；高等级为独立的套间，拥有独立浴室、资料终端和纪念品陈列柜
      功能: 存档、整理个人物品、回顾剧情和资料。高等级房间可邀请关系亲密的圣柩人形前来拜访
      互动: 羁绊加深后，人形会留下小礼物。房间等级越高，触发私密剧情的可能性和种类越多
    科研中心:
      描述: 舰内科研与分析设施。低等级陆行舰初始不具备独立科研舱室，需通过升级解锁；中等级拥有独立实验室和分析仪；高等级科研中心则为一整套综合科研综合体，涵盖ACU分析、逆向工程、新蓝图研发和材料科学研究
      功能: 分析ACU残骸和地表资源，逆向工程新蓝图，加工和研发新型原材料
      互动: 对科研感兴趣的人形会在此协助，可与她们讨论研究方向
    资源加工站:
      描述: 舰内资源回收与加工区域。低等级为噪音和粉尘弥漫的紧凑加工角落；高等级为多层自动化加工综合体，拥有分类、熔炼、重塑全流程产线
      功能: 将废料转化为建材、合金、燃料。高等级加工站可自动化批量生产标准消耗品
      互动: 对机械感兴趣的人形会在此观看，可能提供提高效率的建议