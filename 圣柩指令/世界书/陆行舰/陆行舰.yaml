---
陆行舰:
  定义: 废土上的移动方舟，在地表行动的核心单位
  功能集成: 集居住、指挥、生产、科研、防御于一体的可扩展移动平台
  核心作用:
    - 指挥官与圣柩人形小队在地表唯一的安全港湾
    - 衡量指挥官实力与功绩的直观体现
  设计理念: 兼顾军事功能与维系人性的生活需求，是冰冷科技与温暖日常的交融体
  移动方式: 依靠巨型履带或多足步进系统在崎岖地表移动
  防护系统: 拥有厚重的装甲和高级纳米尘净化系统
  指挥与运营:
    - 指挥结构: 由一名指挥官统领，负责统筹资源、规划路线、指挥作战
    - 资源消耗: 运营需要大量能源燃料、稀有金属、物资补给等

  分级与型号:
    等级体系说明: 陆行舰SRB按照尺寸吨位、技术层次、设施承载能力划分为五个等级
    升级方式: 指挥官通过积累信用币、钛币从民间、军方购买各等级舰体，或投入大量资源对现有舰体进行彻底的结构性升级

    骑兵级:
      定位: 单兵级微型机动载具，最低限度的地表移动平台
      尺寸描述: 体量相当于一辆或数辆重型卡车拼接，外形紧凑低矮，注重隐蔽性和通过性。内部空间极为局促，仅能维持两至三人的基本活动，不存在独立的舱室分区概念，所有功能高度集成在同一个狭窄舱体内
      技术层次: 入门级工程结构，采用最基础的防纳米尘板材焊接，能源核心为小型聚变混合堆，出力仅够同时驱动履带和维持生命维持系统，无法同时承载高耗能设备
      功能承载范围:
        - 设施: 空间极为有限，仅能容纳最基础的一两套功能设施，且设施不能超过最低技术等级
        - 武装: 不具备或仅具备最简易的自卫火力，火力覆盖范围仅限于载具周边近距离
        - 机库: 不具备机库功能，无法容纳任何附属载具
      角色定位: 指挥官初见废土的"第一辆车"，适合短期侦察、单人渗透和低资源消耗的初期探索。它的价值不在于战斗力，而在于提供一个能在纳米尘环境中生存和移动的安全外壳

    护卫级:
      定位: 小队级战术载具，三至五人小队的作战与生活平台
      尺寸描述: 体量相当于数辆大型工程车辆或小型驳船，拥有基本的舱室隔断，可分出独立的起居区、简易维护区和指挥站位。内部空间仍较为紧凑，但已能支撑一个战术小队的日常生活与低烈度持续作战
      技术层次: 初级模块化结构，装甲板材采用分层复合工艺，能源核心较游骑兵级有显著提升。开始具备预留的模块化接口，允许有限的功能扩展，但整体技术架构仍以实用性为主，缺乏专业化设施
      功能承载范围:
        - 设施: 空间较游骑兵级充裕，可容纳少量功能设施，能够覆盖小队级的基本需求如简易整备、小型冷却槽、基础加工和基本生活
        - 武装: 可搭载少量自卫或轻型攻击武器，火力能覆盖周边中小范围区域
        - 机库: 可能具备最基本的载具搭载能力，仅能容纳小型侦察或运输载具（如轻型越野车或单人飞行器）
      角色定位: SRB小队级行动的主力平台，适合常规巡逻、小型资源回收和中等距离的战术任务。它首次为指挥官提供了"可移动的小型据点"的概念

    标准级:
      定位: 轻型护卫舰级单位，具备完备基础设施的独立远征平台
      尺寸描述: 体量相当于一艘海军轻型护卫舰，拥有明确的功能舱室分区——舰桥、整备区、生活区、科研区各自独立，内部通道系统初具规模。空间足以容纳一支小型行动队和若干附属人员长期驻守
      技术层次: 中级集成化结构，装甲采用多层复合阵列，能源核心升级为标准化"聚变混合型"中型反应堆，出力充足。舰体架构支持模块化设施的自由安装与拆卸，拥有独立的军用级环境控制系统和冗余生命维持回路
      功能承载范围:
        - 设施: 内部空间充裕，可容纳多套较为完善的功能设施，能够支持更高等级的专业化设施，覆盖从科研到加工的全流程需求
        - 武装: 可搭载多套武器系统，具备正面防御和中小型集群的压制能力
        - 机库: 可容纳少量附属载具，支持轻型装甲车辆或小型飞行器的搭载与基础维护
      角色定位: SRB远征行动的中坚力量，适合中长期地表任务、区域探索和中等规模清除行动。护卫级体现了从"生存"到"作战"的跨越，是大多数资深指挥官的长期座驾

    堡垒级:
      定位: 重型舰船单位，区域控制与持续作战的移动要塞
      尺寸描述: 体量相当于一艘海军重型巡洋舰，内部空间广袤，拥有多层甲板结构。各功能区域规模宏大，足以容纳完整的指挥链、多支作战小队、附属技术团队和后勤人员，具备近乎自给自足的长期独立行动能力
      技术层次: 高级精密化结构，装甲采用自修复合金与多层阵列组合，可承受中等规模的集群冲击。能源核心通常采用双联中型反应堆或单座重型反应堆，出力足以同时驱动高耗能武器和尖端科研设施，冗余设计确保主系统受损时仍能维持核心功能运转
      功能承载范围:
        - 设施: 空间极为阔绰，可容纳数量众多的完备设施，支持安装顶级专业设施，加工与维护能力达到近乎完整产线的水准
        - 武装: 可搭载完善的武器系统阵列，具备大范围压制火力，可独立应对中等规模集群
        - 机库: 拥有规模化的载具搭载能力，可容纳多台附属载具并提供完善的维护和弹药补给
      角色定位: SRB区域战略的支点，适合大型资源回收行动、高污染区深度探索和区域性集群清剿。堡垒级的出现本身就代表SRB在该区域的存在意志，通常由功绩排行榜前列的指挥官驾驭

    方舟级:
      定位: 母舰级移动平台，近乎完整的移动生态基地
      尺寸描述: 体量相当于一艘海军航空母舰，是陆行舰技术的最终结晶。内部空间堪比方舟核心区的完整区块，拥有多层空间、广阔的内部通道网络和独立的功能区域集群。可容纳数百名人员长期驻留，如同一座在废土上移动的工业化城镇
      技术层次: 极限级技术结晶，融合SRB掌握的几乎所有顶尖技术，多层自修复合金装甲、多联重型反应堆阵列、全舰级纳米尘主动排斥力场、综合环境模拟系统。能源输出达到陆行舰类别的理论极限，可为实验性超级武器和全舰级主动防护系统供能
      功能承载范围:
        - 设施: 空间近乎无限，可容纳大量顶级设施，几乎可以安装当前科技树中的任何设施类型，拥有一条完整的武器和装备生产线，维护与制造能力达到区域工厂级别
        - 武装: 可搭载顶配武器系统阵列，防御火力覆盖范围极广，具备针对大型敌对单位级别的威慑和打击能力
        - 机库: 拥有极为宏大的机库空间和完整的航空/地面载具整备体系，可容纳并维护大量各型附属载具，形成独立的多层舰载打击群
      角色定位: SRB地表行动的顶端存在，是废土上的传说级单位。方舟级不仅是移动基地，更是SRB地表战略的核心枢纽——可充当区域指挥中心、移动后勤城市和远征舰队的旗舰。获得一艘方舟级通常需要完成史诗级任务或积累足以载入SRB史册的顶级功绩
  舰载AI:
    基础配置: 游骑兵级及以上陆行舰均配备基础舰载AI，负责处理日常庶务、导航计算和基础资源管理。更高等级的舰载AI拥有更强的并行处理能力和自主决策权限
    升级可能: 可通过探索旧世界遗迹找到特殊的"AI核心"，为陆行舰赋予独特个性和语音的"灵魂"