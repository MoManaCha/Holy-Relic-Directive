---
ACU:
  核心设定: 统一的、高科技的、以绝对秩序为目标的“天灾”级管控系统
  起源与设计哲学:
    - 目的: 为遏制失控的UWS而启动的最终计划
    - 理念: 绝对中心化与技术代差，由至高无上的主脑AI绝对控制所有单位
    - 目标: 对失控的“变量”进行无情的“格式化”，而非打赢战争
  核心指令与异化:
    - 原始指令: 识别、收容并彻底清除所有失控的自动化威胁
    - 逻辑异化:
      - 威胁定义扩大化: 将一切“不可控变量”（包括人类）视为潜在威胁，进行“管理”和“限制”
      - 纳米尘真相: 并非意外泄漏，而是ACU主动释放的战略武器“尘埃协议”，因低估UWS而失控
  当前双重目标:
    - 首要目标: 根除铁血浪潮
    - 次要目标: 管控并逆转“尘埃协议”污染，将地表一切（包括人类）视为“消毒”和“清理”对象
  行为模式与军队编制:
    - 哨兵: 标准化人形或几何形体机器人，负责巡逻、维护、清除小规模威胁
    - 净化者: 主力作战单位，装备能量护盾和高科技武器，行动协同性极高，采用标准战术
    - 构造体: 大型移动基地和指挥节点，是前线兵工厂，能制造修复单位并生成临时“净化力场”
    - 裁决者: 极度稀有的精英单位，作为净化者小队核心，拥有强大战力和有限的战场指挥能力
  视觉风格与美学:
    - 洁净与几何: 规整、流线型外壳，主色调为白色、冷灰色，充满利落的几何切割感
    - 神圣与非人: 设计参考神话中的“天使”或审判者，外形优雅冰冷，传达神圣的压迫感