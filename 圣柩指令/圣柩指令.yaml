              可见: false

      - 名称: 人形战力计算
        id: 592aedb4-9291-4d9e-9ee5-e67892ab0be2
        启用: false
        类型: 脚本
        内容: |
          // 注册事件监听器，在所有变量更新完成后触发
          eventOn('mag_variable_update_ended', variableUpdateEnded);

          /**
           * 根据圣柩人形的各项属性计算其综合战力。
           * 这是一个核心计算函数，由事件处理器调用。
           * @param {object} dollData - 包含人形所有属性的对象 (例如 variables.stat_data['圣柩']['人形列表']['巴别塔'])。
           * @returns {number} - 计算出的综合战力值，四舍五入为整数。
           */
          function calculateDollCombatPower(dollData) {
              // 1. 等级到数值的映射表
              const rarityMap = {
                  'C': 500,
                  'B': 1000,
                  'A': 2000,
                  'S': 4000,
                  'SS': 7000,
                  'SSS': 12000,
                  'EX': 20000
              };

              const abilityMap = {
                  'D': 10,
                  'C': 30,
                  'B': 50,
                  'A': 80,
                  'S': 120
              };

              // 权重和加成定义

              const weaponLevelBonus = 150; // 每级武装等级提供的战力加成
              const abilityWeights = {
                  '战术执行力': 5,
                  '素体韧性': 5,
                  '心智稳定度': 3,
                  '环境适应性': 3,
                  '成长潜质': 2
              };

              // 3. 从 dollData 中安全地提取属性
              const rarity = dollData['稀有度'] ? dollData['稀有度'][0] : 'C';
              const weaponLevel = (dollData['人形武装'] && dollData['人形武装']['武装等级']) ? dollData['人形武装']['武装等级'][0] : 1;
              const abilities = dollData['人形能力'] || {};

              // 4. 计算各部分分数
              const rarityScore = rarityMap[rarity] || 0;
              const weaponScore = parseInt(weaponLevel, 10) * weaponLevelBonus;

              let abilitiesScore = 0;
              for (const abilityName in abilities) {
                  if (abilityWeights.hasOwnProperty(abilityName)) {
                      const abilityGrade = abilities[abilityName][0];
                      const gradeValue = abilityMap[abilityGrade] || 0;
                      const weight = abilityWeights[abilityName];
                      abilitiesScore += gradeValue * weight;
                  }
              }

              // 5. 计算总战力
              const totalCombatPower = rarityScore + weaponScore + abilitiesScore;

              return Math.round(totalCombatPower);
          }

          /**
           * 在所有变量更新结束后触发。
           * 此函数负责遍历所有人形并更新其战力。
           * 它会强制使用正确的计算结果覆盖现有的战力值，确保数据的准确性。
           */
          function variableUpdateEnded(variables, out_is_updated) {
              out_is_updated = out_is_updated || false;

              // 确保人形列表存在且是一个数组
              if (!variables.stat_data['人形列表'] || !variables.stat_data['人形列表']['圣柩人形'] || !Array.isArray(variables.stat_data['人形列表']['圣柩人形'])) {
                  return out_is_updated;
              }

              // 直接获取人形数组
              const dollsArray = variables.stat_data['人形列表']['圣柩人形'];

              // 遍历数组中的每一个人形
              for (let i = 0; i < dollsArray.length; i++) {
                  const dollData = dollsArray[i];

                  // 确保 dollData 是一个有效的对象，并跳过元数据
                  if (typeof dollData !== 'object' || dollData === null || dollData['$__META_EXTENSIBLE__$']) {
                      continue;
                  }

                  // 调用函数计算战力
                  const newCombatPower = calculateDollCombatPower(dollData);

                  // 确保“人形战力”字段存在，如果不存在则创建
                  if (!dollData['人形战力']) {
                      dollData['人形战力'] = [0, "根据稀有度,人形武装等级与人形能力综合计算"];
                      out_is_updated = true;
                  }

                  // 无论之前的值是什么，都强制更新为最新的正确计算结果
                  if (dollData['人形战力'][0] !== newCombatPower) {
                      dollData['人形战力'][0] = newCombatPower;
                      out_is_updated = true;
                  }
              }

              return out_is_updated;
          }

      - 名称: 数据修正
        id: db96b080-b84a-40f4-b669-60c358ff2d7c
        启用: false
        类型: 脚本
        内容: |
          /**
           * @file shengju-value-corrector.ts
           * @description This script prevents any numerical value within `stat_data` from becoming negative
           * after an update. It works by recursively scanning the final state and correcting any
           * numerical value that has dropped below zero to 0.
           *
           * @author Cline
           * @version 5.0.0
           * @license MIT
           */

          // Declare the environment-provided functions to satisfy the TypeScript linter.
          declare function eventOn(event: string, callback: (...args: any[]) => void): void;

          /**
           * Recursively traverses the stat_data object, finds any numeric values that have become negative,
           * and corrects them to 0.
           *
           * @param {any} currentObj - The current state of the object being traversed.
           * @param {string[]} path - The current path for building user-friendly names.
           * @param {string[]} displayChanges - An array to accumulate log messages for display.
           * @returns {boolean} - True if any changes were made, otherwise false.
           */
          function correctNegativeValuesRecursive(currentObj: any, path: string[], displayChanges: string[]): boolean {
              let madeChanges = false;

              if (currentObj === null || typeof currentObj !== 'object') {
                  return false;
              }

              for (const key in currentObj) {
                  if (!Object.prototype.hasOwnProperty.call(currentObj, key) || key === '$meta') {
                      continue;
                  }

                  const currentValue = currentObj[key];
                  const newPath = [...path, key];

                  // Case 1: The value is an object, recurse.
                  if (currentValue !== null && typeof currentValue === 'object') {
                      if (correctNegativeValuesRecursive(currentValue, newPath, displayChanges)) {
                          madeChanges = true;
                      }
                  }
                  // Case 2: The value is a number (or in an array format [number, ...]) and has become negative.
                  else {
                      let numericValue = Array.isArray(currentValue) ? currentValue[0] : currentValue;

                      if (typeof numericValue === 'number' && numericValue < 0) {
                          const correctedValue = 0;
                          const oldValue = numericValue;

                          if (Array.isArray(currentValue)) {
                              // To ensure change detection, create a new array
                              const newArray = [...currentValue];
                              newArray[0] = correctedValue;
                              currentObj[key] = newArray;
                          } else {
                              currentObj[key] = correctedValue;
                          }

                          const displayName = newPath.join('.');
                          displayChanges.push(`${displayName}从${oldValue}修正为0(防止负值)`);
                          madeChanges = true;
                      }
                  }
              }
              return madeChanges;
          }


          /**
           * Finalizes the variable update by checking for negative values and correcting them to 0.
           *
           * @param {Record<string, any>} variables - The final state of all variables after an update.
           * @param {boolean} out_is_updated - A flag indicating if any updates occurred.
           */
          function finalValidationCheck(variables: Record<string, any>, out_is_updated: boolean) {
              if (!variables || !variables.stat_data) {
                  return;
              }

              const displayChanges: string[] = [];
              const madeCorrections = correctNegativeValuesRecursive(variables.stat_data, [], displayChanges);

              if (madeCorrections) {
                  out_is_updated = true;
                  if (!variables.display_data) {
                      variables.display_data = {};
                  }
                  const logKey = '脚本修正日志';
                  const existingLog = variables.display_data[logKey] ? `${variables.display_data[logKey]}\n` : '';
                  variables.display_data[logKey] = `${existingLog}${displayChanges.join('; ')}`;
              }
          }

          // Register the validation function to the 'mag_variable_update_ended' event.
          eventOn('mag_variable_update_ended', finalValidationCheck);

          console.log('shengju-value-corrector.ts v5.0.0 loaded successfully.');

